<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | AthleteOS</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .card {
        max-width: 420px;
        margin: 24px;
        padding: 24px;
        border-radius: 16px;
        border: 1px solid #334155;
        background: #111827;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        line-height: 1.55;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>AthleteOS cannot reach the network right now. Reconnect and refresh to continue syncing your training data.</p>
    </main>
  </body>
</html>
